<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quỹ rừng xanh</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="signup-wrapper">
        <div class="signup-card">
            <h1>Đăng ký</h1>
            <p>Đăng ký để xem tiến trình của Quỹ rừng xanh.</p>
            <form id="signup">
                <div class="signup-field">
                    <label>Email</label>
                    <input type="text" id="email" placeholder="Enter your email">
                </div>
                <div class="signup-field">
                    <label>Password</label>
                    <input type="text" id="password" placeholder="Enter your password">
                </div>
                <div class="signup-field">
                    <label>Confirm Password</label>
                    <input type="text" id="confirm-password" placeholder="Confirm your password">
                </div>
                <div class="signup-actions">
                    <button class="signup-button" type="submit">Sign Up</button>
                </div>
            </form>
            <p class="signup-info">Đã có tài khoản? <a href="http://127.0.0.1:5500/spck/login.html">Đăng nhập</a></p>
        </div>
    </div>
    <script src="signup.js"></script>
</body>

</html>
